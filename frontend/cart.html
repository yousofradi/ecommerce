<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review your shopping cart and proceed to checkout.">
  <title>Cart — eCommerce Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">🛍️ eStore</a>
      <div class="nav-links">
        <a href="index.html">Shop</a>
        <a href="cart.html" class="active cart-badge">🛒 <span>Cart</span> <span class="cart-count" id="cart-count" style="display:none">0</span></a>
      </div>
    </div>
  </nav>

  <main class="page-content">
    <div class="container">
      <h1 class="page-title">Shopping Cart</h1>
      <p class="page-subtitle" id="cart-subtitle">Review your items before checkout</p>

      <div id="cart-items" style="display:flex;flex-direction:column;gap:16px"></div>

      <div id="cart-empty" class="empty-state hidden">
        <div class="empty-icon">🛒</div>
        <h3 class="empty-title">Your cart is empty</h3>
        <p class="empty-desc">Start shopping to add items to your cart</p>
        <a href="index.html" class="btn btn-primary">Browse Products</a>
      </div>

      <div id="cart-footer" class="mt-32" style="max-width:400px;margin-left:auto">
        <div class="price-summary">
          <div class="price-row total">
            <span>Cart Total</span>
            <span class="price-value" id="cart-total">0 EGP</span>
          </div>
        </div>
        <a href="checkout.html" class="btn btn-primary btn-block mt-16" id="checkout-btn">Proceed to Checkout →</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">&copy; 2026 eStore. All rights reserved.</div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCart);

    function renderCart() {
      const items = Cart.getItems();
      const container = document.getElementById('cart-items');
      const emptyEl = document.getElementById('cart-empty');
      const footerEl = document.getElementById('cart-footer');

      if (!items.length) {
        container.innerHTML = '';
        emptyEl.classList.remove('hidden');
        footerEl.classList.add('hidden');
        return;
      }

      emptyEl.classList.add('hidden');
      footerEl.classList.remove('hidden');

      container.innerHTML = items.map(item => `
        <div class="cart-item slide-up">
          <img class="cart-item-img" src="${item.imageUrl || ''}" alt="${item.name}"
            onerror="this.style.background='var(--bg-glass)';this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjgwIiBoZWlnaHQ9IjgwIiBmaWxsPSIjMWYyOTM3Ii8+PC9zdmc+'">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-options">${item.selectedOptions.map(o => `${o.groupName}: ${o.label}`).join(' · ')}</div>
            <div class="cart-item-price">${formatPrice(item.unitPrice)} each</div>
          </div>
          <div class="cart-item-actions">
            <div class="qty-control">
              <button class="qty-btn" onclick="updateQty('${item.key}', ${item.quantity - 1})">−</button>
              <span class="qty-value">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty('${item.key}', ${item.quantity + 1})">+</button>
            </div>
            <strong>${formatPrice(item.unitPrice * item.quantity)}</strong>
            <button class="btn btn-danger btn-sm" onclick="removeItem('${item.key}')">✕</button>
          </div>
        </div>
      `).join('');

      document.getElementById('cart-total').textContent = formatPrice(Cart.getTotal());
    }

    function updateQty(key, qty) { Cart.updateQty(key, qty); renderCart(); }
    function removeItem(key) { Cart.removeItem(key); renderCart(); showToast('Item removed'); }
  </script>
</body>
</html>
