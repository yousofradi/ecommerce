<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الشراء | Sundura Shop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/store.css">
</head>
<body>
  <div class="page-wrapper">
  <header class="store-header">
    <div class="container">
      <a href="index.html" class="header-icon back-btn" onclick="if(history.length > 1) { history.back(); return false; }"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px; color: var(--text-muted);"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg></a>
      <a href="index" class="store-logo-link"><img src="https://assets.wuiltstore.com/cmo1fsgmc060f01lwhwpn6ga7__D8_B3_D9_86_D8_AF_D9_88_D8_B1.webp" alt="Sundura" class="store-logo-img"></a>
      
      <div class="header-icons">
        <button class="header-icon search-icon-btn" onclick="api.openSearch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <a href="#" onclick="Cart.openCart(); return false;" class="nav-item" id="header-cart-link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="mobile-nav-badge" id="cart-count" style="display:none">0</span>
        </a>
      </div>
    </div>
  </header>
    <main class="page-content">
    <div class="container">
      <h1 class="page-title">إتمام الشراء</h1>
      <p class="page-subtitle">أكمل بياناتك لإتمام الطلب</p>
      <div class="checkout-grid">
        <form id="checkout-form">
          <h2 class="mb-24">بيانات العميل</h2>
          <div class="grid-2" style="gap:16px">
            <div class="form-group">
              <label class="form-label" for="cust-name">الاسم بالكامل *</label>
              <input class="form-control" id="cust-name" required placeholder="الاسم بالكامل">
            </div>
          <div class="grid-2-always" style="gap:16px; margin-bottom:16px;">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="cust-phone">رقم الهاتف *</label>
              <div class="phone-input-wrapper">
                <div class="phone-input-flag">
                  <img src="https://flagcdn.com/w20/eg.png" alt="EG"> +20
                </div>
                <input id="cust-phone" type="tel" required placeholder="01XXXXXXXXX" minlength="11" maxlength="11" pattern="01[0-9]{9}">
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="cust-phone2">هاتف آخر</label>
              <div class="phone-input-wrapper">
                <div class="phone-input-flag">
                  <img src="https://flagcdn.com/w20/eg.png" alt="EG"> +20
                </div>
                <input id="cust-phone2" type="tel" placeholder="اختياري">
              </div>
            </div>
          </div>
            <div class="form-group">
              <label class="form-label" for="government">المحافظة *</label>
              <select class="form-control" id="government" required>
                <option value="">اختر المحافظة...</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="cust-address">العنوان *</label>
            <textarea class="form-control" id="cust-address" required placeholder="العنوان بالتفصيل"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="cust-notes">ملاحظات</label>
            <textarea class="form-control" id="cust-notes" placeholder="ملاحظات إضافية..."></textarea>
          </div>
          <h2 class="mb-24 mt-32">طريقة الدفع</h2>
          <div class="radio-options mb-24">
            <div class="radio-option" style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
              <input type="radio" name="payment" id="pay-instapay" value="instapay">
              <label for="pay-instapay" style="display: flex; align-items: center; justify-content: space-between; width: 100%; cursor: pointer; gap: 8px; background: #F3EBD7; padding: 12px 16px; border-radius: 10px;">
                <span dir="ltr" style="font-size: 1rem; font-weight: 700; color: #111827; letter-spacing: 0.5px;">01016612519</span>
                <div style="display: flex; align-items: center; line-height: 1;">
                  <span style="color:#f26522;font-weight:900;font-style:italic;font-size:14px;">PAY</span><span style="color:#4a2c82;font-weight:900;font-style:italic;font-size:14px;letter-spacing:-0.5px;">INSTA</span>
                </div>
              </label>
            </div>
            <div class="radio-option" style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
              <input type="radio" name="payment" id="pay-vodafone" value="vodafone_cash">
              <label for="pay-vodafone" style="display: flex; align-items: center; justify-content: space-between; width: 100%; cursor: pointer; gap: 8px; background: #F3EBD7; padding: 12px 16px; border-radius: 10px;">
                <span dir="ltr" style="font-size: 1rem; font-weight: 700; color: #111827; letter-spacing: 0.5px;">01016612519</span>
                <div style="background: #e60000; color: #fff; padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 11px; display: flex; align-items: center; line-height: 1.2;">فودافون كاش</div>
              </label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block" style="padding:10px 20px;font-size:1rem;background:var(--sundura-brown,#916C4F);border-color:var(--sundura-brown,#916C4F)">تأكيد الطلب</button>
        </form>
        <div>
          <h2 class="mb-24">ملخص الطلب</h2>
          <div id="order-items" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px"></div>
          <div class="price-summary">
            <div class="price-row"><span>المجموع الفرعي</span><span id="subtotal">0 ج.م</span></div>
            <div class="price-row"><span>الشحن</span><span id="shipping-fee">—</span></div>
            <div class="price-row total"><span>الإجمالي</span><span class="price-value" id="total-price">0 ج.م</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
