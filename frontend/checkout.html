<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — eCommerce Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">🛍️ eStore</a>
      <div class="nav-links">
        <a href="index.html">Shop</a>
        <a href="cart.html" class="cart-badge">🛒 <span>Cart</span> <span class="cart-count" id="cart-count" style="display:none">0</span></a>
      </div>
    </div>
  </nav>
  <main class="page-content">
    <div class="container">
      <h1 class="page-title">Checkout</h1>
      <p class="page-subtitle">Complete your order</p>
      <div class="checkout-grid">
        <form id="checkout-form">
          <h2 class="mb-24">Customer Information</h2>
          <div class="grid-2" style="gap:16px">
            <div class="form-group">
              <label class="form-label" for="cust-name">Full Name *</label>
              <input class="form-control" id="cust-name" required placeholder="Your full name">
            </div>
            <div class="form-group">
              <label class="form-label" for="cust-phone">Phone *</label>
              <input class="form-control" id="cust-phone" type="tel" required placeholder="01xxxxxxxxx">
            </div>
            <div class="form-group">
              <label class="form-label" for="cust-phone2">Second Phone</label>
              <input class="form-control" id="cust-phone2" type="tel" placeholder="Optional">
            </div>
            <div class="form-group">
              <label class="form-label" for="government">Governorate *</label>
              <select class="form-control" id="government" required>
                <option value="">Select governorate...</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="cust-address">Address *</label>
            <textarea class="form-control" id="cust-address" required placeholder="Full delivery address"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="cust-notes">Notes</label>
            <textarea class="form-control" id="cust-notes" placeholder="Any special instructions..."></textarea>
          </div>
          <h2 class="mb-24 mt-32">Payment Method</h2>
          <div class="radio-options mb-24">
            <div class="radio-option">
              <input type="radio" name="payment" id="pay-instapay" value="instapay">
              <label for="pay-instapay">💳 InstaPay</label>
            </div>
            <div class="radio-option">
              <input type="radio" name="payment" id="pay-vodafone" value="vodafone_cash">
              <label for="pay-vodafone">📱 Vodafone Cash</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block" style="padding:16px;font-size:1.1rem">Place Order →</button>
        </form>
        <div>
          <h2 class="mb-24">Order Summary</h2>
          <div id="order-items" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px"></div>
          <div class="price-summary">
            <div class="price-row"><span>Subtotal</span><span id="subtotal">0 EGP</span></div>
            <div class="price-row"><span>Shipping</span><span id="shipping-fee">—</span></div>
            <div class="price-row total"><span>Total</span><span class="price-value" id="total-price">0 EGP</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer"><div class="container">&copy; 2026 eStore. All rights reserved.</div></footer>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
