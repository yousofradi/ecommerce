<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — eStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="store-header">
      <div class="container">
        <a href="index.html" class="store-logo">Sundura Shop</a>
        <nav class="store-nav">
          <a href="index.html" class="active">Home</a>
          <a href="cart.html" class="cart-badge">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count" id="cart-count" style="display:none">0</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="container text-center mb-24">
        <h1 class="page-title">Featured Products</h1>
        <p class="page-subtitle">Discover our latest collection</p>
        
        <div id="categories-nav" class="flex gap-16 mt-24" style="justify-content:center; overflow-x:auto; padding-bottom:8px;">
          <!-- Loaded dynamically -->
        </div>
      </div>
      <div class="container">
        <div id="products-loading"><div class="spinner"></div></div>
        <div class="grid grid-3" id="products-grid"></div>
      </div>
    </main>
  </div>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
