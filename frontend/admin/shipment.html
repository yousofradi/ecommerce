<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Shipment — eStore Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">⚙️ Sundura Admin</div>
      <nav class="admin-nav">
        <a href="index.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="collections.html">Collections</a>
        <a href="orders.html">Orders</a>
        <a href="shipment.html" class="active">Shipment</a>
        <a href="webhooks.html">Webhooks</a>
        <a href="../index.html" target="_blank">View Store ↗</a>
        <a href="#" onclick="logout()" class="logout">Logout</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container" style="max-width:800px;margin:0">
        <div class="flex-between mb-24">
          <div><h1 class="page-title">Shipment Fees</h1><p class="text-muted">Manage shipping costs per governorate.</p></div>
        </div>
        <div class="admin-card mb-24">
          <form id="add-shipment-form" class="flex gap-16">
            <input type="text" id="s-gov" class="form-control" required placeholder="Governorate name (e.g., Cairo)">
            <input type="number" id="s-fee" class="form-control" required placeholder="Fee (EGP)" style="width:120px">
            <button type="submit" class="btn btn-primary">Add</button>
          </form>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Governorate</th><th>Fee (EGP)</th><th>Actions</th></tr></thead>
            <tbody id="shipment-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      loadShipping();

      document.getElementById('add-shipment-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          await api.createShipping({
            governorate: document.getElementById('s-gov').value.trim(),
            fee: Number(document.getElementById('s-fee').value)
          });
          document.getElementById('s-gov').value = '';
          document.getElementById('s-fee').value = '';
          showToast('Added successfully');
          loadShipping();
        } catch (err) { showToast('Error adding fee', 'error'); }
      });
    });

    async function loadShipping() {
      const tbody = document.getElementById('shipment-tbody');
      try {
        const list = await api.getShippingList();
        tbody.innerHTML = list.map(s => `
          <tr>
            <td><strong>${s.governorate}</strong></td>
            <td>
              <input type="number" value="${s.fee}" class="form-control" style="width:100px" id="fee-${s._id}">
            </td>
            <td>
              <div class="flex gap-8">
                <button class="btn btn-sm btn-primary" onclick="updateFee('${s._id}')">Save</button>
                <button class="btn btn-sm btn-secondary" onclick="deleteFee('${s._id}')">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (err) { showToast('Error loading shipping fees', 'error'); }
    }

    async function updateFee(id) {
      try {
        const fee = Number(document.getElementById(`fee-${id}`).value);
        await api.updateShipping(id, { fee });
        showToast('Fee updated');
      } catch (err) { showToast('Error updating fee', 'error'); }
    }

    async function deleteFee(id) {
      if (!confirm('Delete this governorate?')) return;
      try {
        await api.deleteShipping(id);
        showToast('Deleted');
        loadShipping();
      } catch (err) { showToast('Error deleting', 'error'); }
    }
  </script>
</body>
</html>
