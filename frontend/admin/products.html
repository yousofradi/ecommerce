<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنتجات — Sundura Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="admin-brand">⚙️ Sundura</div>
        <button class="sidebar-toggle">☰</button>
      </div>
      <nav class="admin-nav">
        <a href="index.html">🏠 لوحة التحكم</a>
        <a href="products.html" class="active">📦 المنتجات</a>
        <a href="collections.html">🗂️ التصنيفات</a>
        <a href="orders.html">🛒 الطلبات</a>
        <a href="shipment.html">🚚 الشحن</a>
        <a href="webhooks.html">🔗 Webhooks</a>
        <a href="../index.html" target="_blank">🏪 المتجر ↗</a>
        <a href="#" onclick="logout()" class="logout">🚪 خروج</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div style="max-width:1200px">
        <div class="flex-between mb-24">
          <div>
            <h1 class="page-title" style="margin-bottom:4px">المنتجات</h1>
            <p class="page-subtitle" style="margin-bottom:0">إدارة منتجات متجرك</p>
          </div>
          <div class="flex gap-12">
            <div id="bulk-actions" style="display:none;" class="flex gap-8">
              <button class="btn btn-secondary btn-sm" onclick="deactivateSelected()">تعطيل المحدد</button>
              <button class="btn btn-danger btn-sm" onclick="deleteSelected()">حذف المحدد</button>
            </div>
            <button class="btn btn-secondary" onclick="openBulkImportModal()">+ إضافة عدة منتجات</button>
            <a href="product-form.html" class="btn btn-primary">+ إضافة منتج</a>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th style="width: 40px;"><input type="checkbox" id="select-all" onclick="toggleSelectAll()"></th>
                <th>الصورة</th>
                <th>الاسم</th>
                <th>السعر</th>
                <th>الحالة</th>
                <th>الكمية</th>
                <th>التصنيف</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <tr><td colspan="8" class="text-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>

        <!-- Bulk Import Modal -->
        <div id="bulk-import-modal" class="modal-overlay" style="display:none">
          <div class="modal" style="max-width:500px">
            <div class="modal-header">
              <h3 class="modal-title">إضافة عدة منتجات</h3>
              <button class="modal-close" onclick="closeBulkImportModal()">×</button>
            </div>
            <p class="text-muted text-sm mb-16">أدخل روابط المنتجات (رابط لكل حقل)</p>
            <div id="bulk-urls-container">
              <div class="form-group flex gap-8" style="align-items:center">
                <input type="url" class="form-control bulk-url-input" placeholder="رابط المنتج">
                <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()" style="flex-shrink:0">×</button>
              </div>
            </div>
            <button class="btn btn-secondary btn-sm mb-16" onclick="addBulkUrlField()">+ إضافة رابط آخر</button>
            <div class="flex gap-12" style="justify-content:flex-end">
              <button class="btn btn-secondary" onclick="closeBulkImportModal()">إلغاء</button>
              <button class="btn btn-primary" onclick="submitBulkImport()">استيراد</button>
            </div>
          </div>
        </div>

        <div class="flex-between mt-24">
          <div class="text-sm text-muted" id="pagination-info"></div>
          <div class="flex gap-8" id="pagination-controls">
            <button class="btn btn-secondary btn-sm" id="prev-page" onclick="changePage(-1)">السابق</button>
            <button class="btn btn-secondary btn-sm" id="next-page" onclick="changePage(1)">التالي</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/products.js"></script>
</body>
</html>
