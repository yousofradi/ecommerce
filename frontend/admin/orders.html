<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الطلبات — لوحة التحكم</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    @media (max-width: 768px) {
      .orders-table-wrap th:nth-child(4),
      .orders-table-wrap td:nth-child(4),
      .orders-table-wrap th:nth-child(8),
      .orders-table-wrap td:nth-child(8) { display: none; }
    }
    @media (max-width: 540px) {
      .orders-table-wrap th:nth-child(6),
      .orders-table-wrap td:nth-child(6) { display: none; }
      
      /* Make buttons smaller on phone screen */
      .page-actions-container {
        flex-direction: row-reverse;
        justify-content: flex-start;
      }
      .page-actions-container button {
        padding: 4px 8px;
        font-size: 0.8rem;
      }
      .page-actions-container a {
        padding: 4px 8px;
        font-size: 0.8rem;
      }
    }
    
    .order-tab {
      font-size: 0.95rem;
      color: #64748b;
      cursor: pointer;
      position: relative;
      padding-bottom: 16px;
      margin-bottom: -16px;
    }
    .order-tab.active {
      color: #0f766e;
      font-weight: 600;
    }
    .order-tab.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #0f766e;
    }
    .tab-badge {
      display: inline-block;
      background: #f1f5f9;
      color: #475569;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      margin-right: 4px;
    }
    
    .status-badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .badge-paid { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
    .badge-paid .dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; }
    
    .badge-partial { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
    .badge-partial .dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; }

    .badge-unpaid { background: #fff; color: #475569; border: 1px solid #e2e8f0; }
    .badge-unpaid .dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; }
    
    .badge-neutral { background: #f8fafc; color: #475569; border: 1px solid #f1f5f9; }
    .badge-neutral .dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; }
    
    .orders-table-wrap table th {
      padding: 16px;
      font-size: 0.85rem;
      color: #64748b;
      font-weight: 500;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }
    .orders-table-wrap table td {
      padding: 16px;
      font-size: 0.95rem;
      color: #1e293b;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }
    .orders-table-wrap table tr:hover td {
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="admin-brand">⚙️ Sundura Admin</div>
        <button class="sidebar-toggle">☰</button>
      </div>
      <nav class="admin-nav">
        <a href="index.html">لوحة التحكم</a>
        <a href="products.html">المنتجات</a>
        <a href="collections.html">التصنيفات</a>
        <a href="orders.html" class="active">الطلبات</a>
        <a href="shipment.html">الشحن</a>
        <a href="webhooks.html">Webhooks</a>
        <a href="../index.html" target="_blank">عرض المتجر ↗</a>
        <a href="#" onclick="logout()" class="logout">تسجيل الخروج</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="max-width:1300px">
        <div class="flex-between mb-24 align-center">
          <div>
            <h1 class="page-title" style="margin-bottom:0; font-size: 1.5rem; color:#1e293b; font-weight:700;">الطلبات</h1>
          </div>
          <div class="page-actions-container" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <a href="order-form.html" class="btn btn-primary" style="gap:6px; background:#0f766e; border:none; border-radius:20px; padding:8px 20px; font-weight:600;">+ أنشئ طلب</a>
            <button onclick="printInvoices()" class="btn btn-secondary" style="gap:6px; border-radius:20px; padding:8px 20px; background:#fff; border:1px solid #e2e8f0; color:#475569; font-weight:600;" id="print-invoices-btn">استخراج 📥</button>
          </div>
        </div>

        <div style="background:#fff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
          <div id="filter-bar" style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #f1f5f9; flex-wrap:wrap; gap:16px;">
            
            <!-- Tabs (On Right in RTL) -->
            <div style="display:flex; gap:24px; align-items:center;" class="order-tabs">
              <span class="order-tab active" data-filter="all" onclick="setFilter('all')">الجميع <span class="tab-badge" id="count-all">0</span></span>
              <span class="order-tab" data-filter="pending" onclick="setFilter('pending')">بانتظار التجهيز <span class="tab-badge" id="count-pending">0</span></span>
              <span class="order-tab" data-filter="unpaid" onclick="setFilter('unpaid')">غير مدفوع <span class="tab-badge" id="count-unpaid">0</span></span>
              <span class="order-tab" data-filter="archived" onclick="setFilter('archived')">الأرشيف</span>
            </div>

            <!-- Search (On Left in RTL) -->
            <div style="position:relative; width:300px; max-width:100%;">
              <input type="text" id="order-search" placeholder="البحث والتصنيفات" style="width:100%; padding:8px 16px; padding-left:40px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.9rem;" oninput="filterOrdersClient()">
              <span style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#94a3b8; pointer-events:none;">🔍</span>
            </div>
          </div>
          
          <!-- Bulk Actions Bar (Hidden by default) -->
          <div id="bulk-actions-bar" style="display:none; justify-content:flex-end; align-items:center; padding:16px 20px; border-bottom:1px solid #f1f5f9; background:#fff; gap:12px;">
            <div style="position:relative;">
              <button class="btn btn-secondary" onclick="toggleBulkMenu(event)" style="border-radius:20px; padding:8px 16px; border:1px solid #e2e8f0; background:#fff; color:#475569; font-weight:600; display:flex; align-items:center; gap:8px;">
                المزيد
                <span style="font-size:0.8rem; margin-top:2px;">▼</span>
              </button>
              <div id="bulk-menu" style="display:none; position:absolute; top:100%; right:0; margin-top:8px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); width:200px; z-index:100; overflow:hidden;">
                <button onclick="bulkAction('archive')" style="width:100%; text-align:right; padding:12px 16px; background:none; border:none; border-bottom:1px solid #f1f5f9; cursor:pointer; display:flex; align-items:center; gap:12px; color:#475569; font-size:0.95rem; font-family:inherit;">
                  <span style="font-size:1.1rem; filter:grayscale(1); opacity:0.7;">📦</span> أرشفة
                </button>
                <button onclick="bulkAction('add_tags')" style="width:100%; text-align:right; padding:12px 16px; background:none; border:none; border-bottom:1px solid #f1f5f9; cursor:pointer; display:flex; align-items:center; gap:12px; color:#475569; font-size:0.95rem; font-family:inherit;">
                  <span style="font-size:1.1rem; filter:grayscale(1); opacity:0.7;">🏷️</span> أضف تصنيفات
                </button>
                <button onclick="bulkAction('remove_tags')" style="width:100%; text-align:right; padding:12px 16px; background:none; border:none; border-bottom:1px solid #f1f5f9; cursor:pointer; display:flex; align-items:center; gap:12px; color:#475569; font-size:0.95rem; font-family:inherit;">
                  <span style="font-size:1.1rem; filter:grayscale(1); opacity:0.7;">🏷️</span> إزالة التصنيفات
                </button>
                <button onclick="printInvoices()" style="width:100%; text-align:right; padding:12px 16px; background:none; border:none; border-bottom:1px solid #f1f5f9; cursor:pointer; display:flex; align-items:center; gap:12px; color:#475569; font-size:0.95rem; font-family:inherit;">
                  <span style="font-size:1.1rem; filter:grayscale(1); opacity:0.7;">📥</span> استخراج
                </button>
                <button onclick="bulkAction('delete')" style="width:100%; text-align:right; padding:12px 16px; background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:12px; color:#ef4444; font-size:0.95rem; font-family:inherit;">
                  <span style="font-size:1.1rem; filter:grayscale(1); opacity:0.7;">🗑️</span> إلغاء
                </button>
              </div>
            </div>
            <button class="btn btn-primary" onclick="toggleSelectAll()" style="border-radius:20px; padding:8px 16px; border:none; background:#0f766e; color:#fff; font-weight:600; display:flex; align-items:center; gap:8px;">
              تم تحديد <span id="selected-count-badge">1</span>
              <span style="background:rgba(255,255,255,0.2); border-radius:4px; width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center; font-weight:bold;">-</span>
            </button>
          </div>

          <div class="table-wrapper orders-table-wrap" style="box-shadow:none; border-radius:0; margin:0; border:none;">
            <table style="width:100%; border-collapse:collapse; text-align:right;">
              <thead>
                <tr>
                  <th style="width: 40px; text-align: center;">
                    <input type="checkbox" id="select-all-orders" onchange="toggleSelectAll()" style="width:16px; height:16px; border-radius:4px; accent-color:#0f766e;">
                  </th>
                  <th>رقم الطلب</th>
                  <th>العميل</th>
                  <th>المنتجات</th>
                  <th>الإجمالي</th>
                  <th>الدفع</th>
                  <th>الحالة</th>
                  <th>التاريخ</th>
                </tr>
              </thead>
              <tbody id="orders-tbody">
                <tr><td colspan="8" class="text-center" style="padding:32px;"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
          
          <!-- Footer Pagination -->
          <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-top:1px solid #f1f5f9; background:#fff;">
            <div style="font-size:0.85rem; color:#64748b; display:flex; align-items:center; gap:8px;">
              عدد الطلبات في الصفحة 
              <select style="border:1px solid #e2e8f0; border-radius:6px; padding:4px 8px; font-size:0.9rem; background:#fff; color:#1e293b;">
                <option>20</option>
                <option>50</option>
              </select>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <button class="btn btn-sm" style="background:#fff; border:1px solid #e2e8f0; color:#94a3b8; border-radius:6px; padding:4px 8px;">&gt;</button>
              <select style="border:1px solid #e2e8f0; border-radius:6px; padding:4px 8px; font-size:0.9rem; background:#fff;">
                <option>1</option>
              </select>
              <button class="btn btn-sm" style="background:#fff; border:1px solid #e2e8f0; color:#94a3b8; border-radius:6px; padding:4px 8px;">&lt;</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/orders.js"></script>
</body>
</html>
