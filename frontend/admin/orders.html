<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الطلبات — لوحة التحكم</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    @media (max-width: 768px) {
      .orders-table-wrap th:nth-child(4),
      .orders-table-wrap td:nth-child(4),
      .orders-table-wrap th:nth-child(8),
      .orders-table-wrap td:nth-child(8) { display: none; }
    }
    @media (max-width: 540px) {
      .orders-table-wrap th:nth-child(6),
      .orders-table-wrap td:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="admin-brand">⚙️ Sundura Admin</div>
        <button class="sidebar-toggle">☰</button>
      </div>
      <nav class="admin-nav">
        <a href="index.html">لوحة التحكم</a>
        <a href="products.html">المنتجات</a>
        <a href="collections.html">التصنيفات</a>
        <a href="orders.html" class="active">الطلبات</a>
        <a href="shipment.html">الشحن</a>
        <a href="webhooks.html">Webhooks</a>
        <a href="../index.html" target="_blank">عرض المتجر ↗</a>
        <a href="#" onclick="logout()" class="logout">تسجيل الخروج</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="max-width:1300px">
        <div class="flex-between mb-24">
          <div>
            <h1 class="page-title" style="margin-bottom:4px">الطلبات</h1>
            <p class="page-subtitle" style="margin-bottom:0">عرض وإدارة جميع الطلبات</p>
          </div>
          <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button onclick="toggleArchivedView()" class="btn btn-secondary" style="gap:6px" id="view-archived-btn">📂 عرض المؤرشفة</button>
            <button onclick="archiveSelected()" class="btn btn-warning" style="gap:6px; display:none;" id="archive-selected-btn">📦 أرشفة المحدد</button>
            <button onclick="printInvoices()" class="btn btn-secondary" style="gap:6px" id="print-invoices-btn">🖨️ طباعة الفواتير</button>
            <a href="order-form.html" class="btn btn-primary" style="gap:6px">+ إنشاء طلب</a>
          </div>
        </div>

        <div class="table-wrapper orders-table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width: 40px; text-align: center;">
                  <input type="checkbox" id="select-all-orders" onchange="toggleSelectAll()">
                </th>
                <th>رقم الطلب</th>
                <th>العميل</th>
                <th>المنتجات</th>
                <th>الإجمالي</th>
                <th>الدفع</th>
                <th>الحالة</th>
                <th>التاريخ</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="8" class="text-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/orders.js"></script>
</body>
</html>
