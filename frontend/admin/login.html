<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — Sundura Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-body)">
  <div class="admin-card" style="max-width:420px;width:100%;padding:40px;margin:20px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:2.5rem;margin-bottom:12px">⚙️</div>
      <h1 style="font-size:1.5rem;margin-bottom:6px">Sundura Admin</h1>
      <p class="text-muted">أدخل مفتاح الوصول للمتابعة</p>
    </div>

    <div class="form-group">
      <label class="form-label">مفتاح الإدارة (API Key)</label>
      <input type="password" id="api-key" class="form-control" placeholder="••••••••••••"
        style="font-size:1rem;padding:12px 14px"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div id="login-error" style="color:var(--danger);font-size:0.88rem;margin-bottom:12px;display:none">
      ❌ مفتاح غير صحيح، يرجى المحاولة مرة أخرى
    </div>
    <button class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()" style="padding:13px;font-size:1rem">
      دخول
    </button>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // If already logged in, redirect
    if (sessionStorage.getItem('adminKey')) window.location.href = 'index.html';

    async function doLogin() {
      const key = document.getElementById('api-key').value.trim();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      if (!key) return;

      btn.disabled = true;
      btn.textContent = 'جارٍ التحقق...';
      err.style.display = 'none';

      sessionStorage.setItem('adminKey', key);
      const ok = await api.checkAdmin();

      if (ok) {
        window.location.href = 'index.html';
      } else {
        sessionStorage.removeItem('adminKey');
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'دخول';
      }
    }
  </script>
</body>
</html>
