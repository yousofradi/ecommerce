<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Webhooks — eStore Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">⚙️ Sundura Admin</div>
      <nav class="admin-nav">
        <a href="index.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="collections.html">Collections</a>
        <a href="orders.html">Orders</a>
        <a href="shipment.html">Shipment</a>
        <a href="webhooks.html" class="active">Webhooks</a>
        <a href="../index.html" target="_blank">View Store ↗</a>
        <a href="#" onclick="logout()" class="logout">Logout</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container" style="max-width:800px;margin:0">
        <div class="flex-between mb-24">
          <div><h1 class="page-title">Webhooks</h1><p class="text-muted">Send real-time order updates to external URLs.</p></div>
        </div>
        <div class="admin-card mb-24">
          <form id="add-webhook-form">
            <div class="grid-2 gap-16 mb-16">
              <input type="url" id="w-url" class="form-control" required placeholder="https://your-webhook.url">
              <input type="text" id="w-desc" class="form-control" placeholder="Description (e.g., Zapier Integration)">
            </div>
            <button type="submit" class="btn btn-primary">Add Webhook</button>
          </form>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>URL</th><th>Description</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="webhooks-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      loadWebhooks();

      document.getElementById('add-webhook-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          await api.createWebhook({
            url: document.getElementById('w-url').value.trim(),
            description: document.getElementById('w-desc').value.trim()
          });
          document.getElementById('w-url').value = '';
          document.getElementById('w-desc').value = '';
          showToast('Webhook added successfully');
          loadWebhooks();
        } catch (err) { showToast('Error adding webhook', 'error'); }
      });
    });

    async function loadWebhooks() {
      const tbody = document.getElementById('webhooks-tbody');
      try {
        const list = await api.getWebhooks();
        if(!list.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No webhooks registered.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(w => `
          <tr>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${w.url}</td>
            <td class="text-muted">${w.description || '—'}</td>
            <td><span class="badge ${w.active ? 'badge-success' : 'badge-warning'}">${w.active ? 'Active' : 'Inactive'}</span></td>
            <td>
              <button class="btn btn-sm btn-secondary" onclick="deleteWebhook('${w._id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      } catch (err) { showToast('Error loading webhooks', 'error'); }
    }

    async function deleteWebhook(id) {
      if (!confirm('Delete this webhook?')) return;
      try {
        await api.deleteWebhook(id);
        showToast('Deleted');
        loadWebhooks();
      } catch (err) { showToast('Error deleting', 'error'); }
    }
  </script>
</body>
</html>
