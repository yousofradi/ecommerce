<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التصنيفات — Sundura Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .collection-row {
      display: grid;
      grid-template-columns: 80px 1fr 150px 100px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #eee;
      gap: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .collection-row:hover { background: #f8fafc; }
    .collection-row.header {
      font-weight: 600;
      color: var(--text-muted);
      background: #f9fafb;
      border-radius: 8px 8px 0 0;
      cursor: default;
    }
    .collection-row.header:hover { background: #f9fafb; }
    .collection-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      background: #eee;
    }
    .collection-img-placeholder {
      width: 60px; height: 60px;
      border-radius: 8px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: #94a3b8;
    }
    .btn-create-collection {
      background: #009688;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .search-bar {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 16px;
    }
    .action-menu {
      color: #999;
      cursor: pointer;
      font-size: 1.5rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      .collection-row {
        grid-template-columns: 50px 1fr 60px;
        gap: 10px;
        padding: 12px;
      }
      .collection-row .col-products { display: none; }
      .collection-row.header .col-products { display: none; }
      .collection-img, .collection-img-placeholder {
        width: 46px; height: 46px;
      }
    }
    @media (max-width: 480px) {
      .header-actions { flex-direction: column; align-items: stretch; }
      .header-actions h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="admin-brand">⚙️ Sundura</div>
        <button class="sidebar-toggle" title="القائمة">☰</button>
      </div>
      <nav class="admin-nav">
        <a href="index">🏠 لوحة التحكم</a>
        <a href="homepage">🏪 الصفحة الرئيسية</a>
        <a href="products">📦 المنتجات</a>
        <a href="collections" class="active">🗂️ التصنيفات</a>
        <a href="orders">🛒 الطلبات</a>
        <a href="shipment">🚚 الشحن</a>
        <a href="webhooks">🔗 Webhooks</a>
        <a href="../" target="_blank">🌐 المتجر ↗</a>
        <a href="#" onclick="logout()" class="logout">🚪 خروج</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="header-actions">
        <h1 class="page-title" style="margin:0">التصنيفات</h1>
        <a href="collection-form" class="btn-create-collection">+ إنشاء تصنيف</a>
      </div>

      <div class="admin-card" style="padding:0; overflow:hidden;">
        <div style="padding:16px;">
          <input type="text" id="search-input" class="search-bar" placeholder="🔍 أبحث عن تصنيف...">
        </div>
        
        <div class="collection-list-container">
          <div class="collection-row header">
            <div>الصورة</div>
            <div>الاسم</div>
            <div style="text-align:center" class="col-products">المنتجات</div>
            <div style="text-align:center">إجراءات</div>
          </div>
          <div id="collections-list">
            <div style="padding:40px;text-align:center;color:#666"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/collections.js"></script>
</body>
</html>
