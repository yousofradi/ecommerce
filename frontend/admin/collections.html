<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التصنيفات — Sundura Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .collection-row {
      display: grid;
      grid-template-columns: 80px 1fr 150px 100px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #eee;
      gap: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .collection-row:hover { background: #f8fafc; }
    .collection-row.header {
      font-weight: 600;
      color: var(--text-muted);
      background: #f9fafb;
      border-radius: 8px 8px 0 0;
      cursor: default;
    }
    .collection-row.header:hover { background: #f9fafb; }
    .collection-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      background: #eee;
    }
    .collection-img-placeholder {
      width: 60px; height: 60px;
      border-radius: 8px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: #94a3b8;
    }
    .btn-create-collection {
      background: #009688;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .search-bar {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 16px;
    }
    .action-menu {
      color: #999;
      cursor: pointer;
      font-size: 1.5rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      .collection-row {
        grid-template-columns: 50px 1fr 60px;
        gap: 10px;
        padding: 12px;
      }
      .collection-row .col-products { display: none; }
      .collection-row.header .col-products { display: none; }
      .collection-img, .collection-img-placeholder {
        width: 46px; height: 46px;
      }
    }
    @media (max-width: 480px) {
      .header-actions { flex-direction: column; align-items: stretch; }
      .header-actions h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    
    <aside class="admin-sidebar">
      <div class="admin-brand-header">
        <div class="admin-brand-sub">متاجري <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="admin-brand-title">Sundura Shop</div>
        <a href="../" target="_blank" class="admin-store-preview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          معاينة المتجر
        </a>
      </div>
      <button class="sidebar-toggle" style="position:absolute; top:20px; left:20px; background:none; border:none; font-size:1.5rem; cursor:pointer; color:#475569;">☰</button>
      
      <div style="font-size:0.85rem; font-weight:600; color:#94a3b8; margin-bottom:8px; padding-right:14px;">متجري</div>
      <nav class="admin-nav">
        <a href="index">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          الرئيسية
        </a>
        <a href="orders">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          الطلبات
        </a>
        <a href="products">
          <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          المنتجات
        </a>
        <a href="collections" class="active">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          المجموعات
        </a>
        <a href="homepage">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
          تخصيص الواجهة
        </a>
        <a href="shipment">
          <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
          الشحن
        </a>
        <a href="webhooks">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          Webhooks
        </a>
        <a href="#" onclick="logout()" class="logout">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          خروج
        </a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="header-actions">
        <h1 class="page-title" style="margin:0">التصنيفات</h1>
        <a href="collection-form" class="btn-create-collection">+ إنشاء تصنيف</a>
      </div>

      <div class="admin-card" style="padding:0; overflow:hidden;">
        <div style="padding:16px;">
          <input type="text" id="search-input" class="search-bar" placeholder="🔍 أبحث عن تصنيف...">
        </div>
        
        <div class="collection-list-container">
          <div class="collection-row header">
            <div>الصورة</div>
            <div>الاسم</div>
            <div style="text-align:center" class="col-products">المنتجات</div>
            <div style="text-align:center">إجراءات</div>
          </div>
          <div id="collections-list">
            <div style="padding:40px;text-align:center;color:#666"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/admin/collections.js"></script>
</body>
</html>
