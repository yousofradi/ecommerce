<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التصنيفات — Sundura Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="admin-brand">⚙️ Sundura</div>
        <button class="sidebar-toggle">☰</button>
      </div>
      <nav class="admin-nav">
        <a href="index.html">🏠 لوحة التحكم</a>
        <a href="products.html">📦 المنتجات</a>
        <a href="collections.html" class="active">🗂️ التصنيفات</a>
        <a href="orders.html">🛒 الطلبات</a>
        <a href="shipment.html">🚚 الشحن</a>
        <a href="webhooks.html">🔗 Webhooks</a>
        <a href="../index.html" target="_blank">🏪 المتجر ↗</a>
        <a href="#" onclick="logout()" class="logout">🚪 خروج</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div style="max-width:1000px">
        <div class="flex-between mb-24">
          <div>
            <h1 class="page-title" style="margin-bottom:4px">التصنيفات</h1>
            <p class="page-subtitle" style="margin-bottom:0">تنظيم منتجاتك في فئات</p>
          </div>
          <a href="collection-form.html" class="btn btn-primary">+ إضافة تصنيف</a>
        </div>
        <div id="collections-grid" class="grid grid-3">
          <div class="admin-card text-center"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      const grid = document.getElementById('collections-grid');
      try {
        const cols = await api.getCollections();
        if (!cols.length) {
          grid.innerHTML = '<div class="admin-card text-center text-muted" style="grid-column:1/-1;padding:40px">لا توجد تصنيفات بعد</div>';
          return;
        }
        grid.innerHTML = cols.map(c => `
          <div class="admin-card">
            ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.name}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:12px">` : ''}
            <h3 style="margin-bottom:6px">${c.name}</h3>
            <p class="text-muted text-sm">${c.description || ''}</p>
            <div class="flex gap-8 mt-16">
              <a href="collection-form.html?id=${c._id}" class="btn btn-secondary btn-sm">تعديل</a>
              <button class="btn btn-danger btn-sm" onclick="deleteCol('${c._id}')">حذف</button>
            </div>
          </div>`).join('');
      } catch (e) { grid.innerHTML = '<p class="text-muted text-center" style="grid-column:1/-1">فشل التحميل</p>'; }
    });

    async function deleteCol(id) {
      if (!confirm('حذف هذا التصنيف؟')) return;
      try { await api.deleteCollection(id); location.reload(); }
      catch (e) { showToast(e.message, 'error'); }
    }
  </script>
</body>
</html>
