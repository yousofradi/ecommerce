<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — eStore</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">⚙️ Sundura Admin</div>
      <nav class="admin-nav">
        <a href="index.html" class="active">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="orders.html">Orders</a>
        <a href="../index.html" target="_blank">View Store ↗</a>
        <a href="#" onclick="logout()" class="logout">Logout</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container" style="max-width:1000px;margin:0">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Overview of your store performance</p>
        
        <div class="grid grid-3 mb-24" id="stats">
          <div class="admin-card text-center"><div class="page-title" style="color:var(--primary)" id="stat-products">—</div><div class="text-muted">Products</div></div>
          <div class="admin-card text-center"><div class="page-title" style="color:var(--primary)" id="stat-orders">—</div><div class="text-muted">Orders</div></div>
          <div class="admin-card text-center"><div class="page-title" style="color:var(--primary)" id="stat-revenue">—</div><div class="text-muted">Revenue</div></div>
        </div>
        
        <div class="grid grid-2">
          <a href="products.html" class="admin-card" style="text-align:center;text-decoration:none;display:block">
            <h3>🛍️ Manage Products</h3><p class="text-muted mt-8">Add, edit, and manage your inventory</p>
          </a>
          <a href="orders.html" class="admin-card" style="text-align:center;text-decoration:none;display:block">
            <h3>📦 View Orders</h3><p class="text-muted mt-8">Process customer orders</p>
          </a>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      try {
        const [products, orders] = await Promise.all([api.getProducts(), api.getOrders()]);
        document.getElementById('stat-products').textContent = products.length;
        document.getElementById('stat-orders').textContent = orders.length;
        const revenue = orders.reduce((s, o) => s + o.paidAmount, 0);
        document.getElementById('stat-revenue').textContent = formatPrice(revenue);
      } catch (err) { showToast('Failed to load stats', 'error'); }
    });
  </script>
</body>
</html>
