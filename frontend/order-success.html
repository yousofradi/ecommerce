<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — eCommerce Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">🛍️ eStore</a>
      <div class="nav-links">
        <a href="index.html">Shop</a>
        <a href="cart.html" class="cart-badge">🛒 <span>Cart</span> <span class="cart-count" id="cart-count" style="display:none">0</span></a>
      </div>
    </div>
  </nav>
  <main class="page-content">
    <div class="container">
      <div class="success-container fade-in">
        <div class="success-icon">✅</div>
        <h1 class="page-title">Order Placed!</h1>
        <p class="page-subtitle">Thank you for your order. We'll get it to you soon.</p>
        <div class="success-order-id" id="order-id-display">Loading...</div>
        <div class="mt-32">
          <a href="index.html" class="btn btn-primary">Continue Shopping</a>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer"><div class="container">&copy; 2026 eStore. All rights reserved.</div></footer>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const orderId = sessionStorage.getItem('lastOrderId');
      const el = document.getElementById('order-id-display');
      if (orderId) {
        el.textContent = 'Order ID: ' + orderId;
        sessionStorage.removeItem('lastOrderId');
      } else {
        el.textContent = 'No recent order found';
      }
      Cart.clear();
    });
  </script>
</body>
</html>
