<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — eCommerce Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="store-header">
      <div class="container">
        <a href="index" class="store-logo">Sundura Shop</a>
        <nav class="store-nav">
          <a href="index">Home</a>
          <a href="cart" class="cart-badge">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count" id="cart-count" style="display:none">0</span>
          </a>
        </nav>
      </div>
    </header>
    <main class="page-content">
    <div class="container">
      <div class="success-container fade-in">
        <div class="success-icon">✅</div>
        <h1 class="page-title">Order Placed!</h1>
        <p class="page-subtitle">Thank you for your order. We'll get it to you soon.</p>
        <div class="success-order-id" id="order-id-display">Loading...</div>
        <div class="mt-32">
          <a href="index" class="btn btn-primary">Continue Shopping</a>
        </div>
      </div>
    </div>
  </main>
</div>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const orderId = sessionStorage.getItem('lastOrderId');
      const el = document.getElementById('order-id-display');
      if (orderId) {
        el.textContent = 'Order ID: ' + orderId;
        sessionStorage.removeItem('lastOrderId');
      } else {
        el.textContent = 'No recent order found';
      }
      Cart.clear();
    });
  </script>
</body>
</html>
